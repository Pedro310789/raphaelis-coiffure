# Pages CMS configuration — https://pagescms.org/docs/configuration
#
# The site is multilingual (FR default at `/`, EN at `/en/`). Pages CMS has no
# built-in i18n, so each translatable section is modelled as a group with one
# `file` entry per locale, pointing at the matching MDX in
# `src/content/pages/{locale}/{page}/`.

media:
  input: src/assets/images
  output: src/assets/images
  extensions: [jpg, jpeg, png, webp, avif, svg]

content:
  # Global, locale-independent settings. The booking link lives here so the
  # third-party booking tool can change in one place and every "Réserver" / CTA
  # button across the site follows it.
  - name: settings
    label: Site settings
    type: file
    path: src/data/settings.json
    format: json
    fields:
      - name: bookingUrl
        label: Booking link (global)
        description: >-
          URL of the third-party booking tool used by every booking CTA on the
          site. Use a full https:// link to open it in a new tab, or an internal
          path like /contact.
        type: string

  # Per-page SEO metadata (meta title, meta description, social share image).
  # One file per main page per locale — these feed the <title>, meta description
  # and Open Graph / Twitter tags rendered in the base layout.
  - name: seo
    label: SEO
    type: group
    items:
      - name: seo_home_fr
        label: Home (FR)
        type: file
        path: src/content/pages/fr/home/seo.mdx
        format: yaml-frontmatter
        fields: &seoFields
          - name: title
            label: Meta title
            description: Browser tab title and social share headline.
            type: string
          - name: description
            label: Meta description
            description: Search-result and social-share summary (~155 characters).
            type: text
          - name: image
            label: Featured image (social share)
            description: >-
              Shown when the page is shared on social media (Open Graph /
              Twitter). Recommended 1200×630. Falls back to the site default if
              left empty.
            type: image
            options:
              path: src/assets/images/og
          - name: imageAlt
            label: Featured image alt text
            type: string
      - name: seo_home_en
        label: Home (EN)
        type: file
        path: src/content/pages/en/home/seo.mdx
        format: yaml-frontmatter
        fields: *seoFields
      - name: seo_maison_fr
        label: Maison (FR)
        type: file
        path: src/content/pages/fr/maison/seo.mdx
        format: yaml-frontmatter
        fields: *seoFields
      - name: seo_maison_en
        label: Maison (EN)
        type: file
        path: src/content/pages/en/maison/seo.mdx
        format: yaml-frontmatter
        fields: *seoFields
      - name: seo_services_fr
        label: Services (FR)
        type: file
        path: src/content/pages/fr/services/seo.mdx
        format: yaml-frontmatter
        fields: *seoFields
      - name: seo_services_en
        label: Services (EN)
        type: file
        path: src/content/pages/en/services/seo.mdx
        format: yaml-frontmatter
        fields: *seoFields
      - name: seo_collection_fr
        label: Collection (FR)
        type: file
        path: src/content/pages/fr/collection/seo.mdx
        format: yaml-frontmatter
        fields: *seoFields
      - name: seo_collection_en
        label: Collection (EN)
        type: file
        path: src/content/pages/en/collection/seo.mdx
        format: yaml-frontmatter
        fields: *seoFields
      - name: seo_contact_fr
        label: Contact (FR)
        type: file
        path: src/content/pages/fr/contact/seo.mdx
        format: yaml-frontmatter
        fields: *seoFields
      - name: seo_contact_en
        label: Contact (EN)
        type: file
        path: src/content/pages/en/contact/seo.mdx
        format: yaml-frontmatter
        fields: *seoFields

  # Services section ("Ce que nous faisons, nous le faisons bien") — home page.
  - name: services
    label: Services section
    type: group
    items:
      - name: services_fr
        label: Services (FR)
        type: file
        path: src/content/pages/fr/home/services.mdx
        format: yaml-frontmatter
        fields: &servicesFields
          - name: overline
            label: Overline
            type: string
          - name: heading
            label: Heading lines
            description: Each entry renders as its own line in the heading.
            type: string
            list: true
          - name: cards
            label: Service cards
            type: object
            list: true
            fields:
              - name: numeral
                label: Numeral
                type: string
              - name: image
                label: Image
                type: object
                fields:
                  - name: src
                    label: File
                    type: image
                    options:
                      path: src/assets/images/services
                  - name: alt
                    label: Alt text
                    type: string
              - name: title
                label: Title
                type: string
              - name: body
                label: Body
                type: text
              - name: cta
                label: CTA
                type: object
                fields:
                  - name: label
                    label: Button label
                    description: >-
                      Visible text only — the link is the global booking link in
                      Site settings.
                    type: string
      - name: services_en
        label: Services (EN)
        type: file
        path: src/content/pages/en/home/services.mdx
        format: yaml-frontmatter
        fields: *servicesFields

  # Services disciplines accordion ("Notre savoir-faire / L'excellence en quatre disciplines") — services page.
  - name: services_disciplines
    label: Services disciplines accordion
    type: group
    items:
      - name: services_disciplines_fr
        label: Services disciplines (FR)
        type: file
        path: src/content/pages/fr/services/services-disciplines.mdx
        format: yaml-frontmatter
        fields: &servicesDisciplinesFields
          - name: overline
            label: Overline
            type: string
          - name: heading
            label: Heading lines
            description: Each entry renders as its own line in the heading.
            type: string
            list: true
          - name: disciplines
            label: Disciplines
            type: object
            list: true
            fields:
              - name: numeral
                label: Numeral (e.g. I, II, III, IV)
                type: string
              - name: title
                label: Title
                type: string
              - name: body
                label: Description
                type: text
              - name: image
                label: Image
                type: object
                fields:
                  - name: src
                    label: File
                    type: image
                    options:
                      path: src/assets/images/services
                  - name: alt
                    label: Alt text
                    type: string
              - name: items
                label: Techniques / Services list
                description: Each entry appears as a checkmark item in the expanded accordion row.
                type: string
                list: true
      - name: services_disciplines_en
        label: Services disciplines (EN)
        type: file
        path: src/content/pages/en/services/services-disciplines.mdx
        format: yaml-frontmatter
        fields: *servicesDisciplinesFields

  # Collection gallery ("Couleurs, coupes, soins.") — collection page.
  - name: collection_gallery
    label: Collection gallery
    type: group
    items:
      - name: collection_gallery_fr
        label: Collection gallery (FR)
        type: file
        path: src/content/pages/fr/collection/collection-gallery.mdx
        format: yaml-frontmatter
        fields: &collectionGalleryFields
          - name: overline
            label: Overline
            type: string
          - name: heading
            label: Heading
            type: string
          - name: images
            label: Gallery images
            type: object
            list: true
            fields:
              - name: src
                label: File
                type: image
                options:
                  path: src/assets/images/collections
              - name: alt
                label: Alt text
                type: string
              - name: caption
                label: Caption
                description: Short label shown below the image (e.g. "Coupe · Carré net").
                type: string
      - name: collection_gallery_en
        label: Collection gallery (EN)
        type: file
        path: src/content/pages/en/collection/collection-gallery.mdx
        format: yaml-frontmatter
        fields: *collectionGalleryFields
